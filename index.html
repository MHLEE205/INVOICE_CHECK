<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEENAI 請求書確認ツール v2.6</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ── CSS 변수: 다크 테마 기본 ── */
:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
  --accent:#4f8ef7;--ok:#22c55e;--warn:#f59e0b;--error:#ef4444;
  --info:#38bdf8;--text:#e2e8f0;--text2:#8892a4;--text3:#4a5568;
}
/* ── 라이트 테마 오버라이드 ── */
[data-theme="light"] {
  --bg:#f4f6fb;--surface:#ffffff;--surface2:#f0f4ff;--border:#d1d5db;
  --text:#111827;--text2:#6b7280;--text3:#9ca3af;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.logo{font-size:17px;font-weight:700;letter-spacing:1px;}.logo span{color:var(--accent);}
.version{color:var(--text2);font-size:11px;background:var(--surface2);padding:2px 8px;border-radius:4px;}
.api-mini{margin-left:auto;display:flex;align-items:center;gap:8px;}
.api-mini input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;width:220px;font-size:12px;}
.api-mini input:focus{outline:none;border-color:var(--accent);}
.api-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);}.api-dot.ok{background:var(--ok);}
.tabs{display:flex;gap:2px;padding:16px 20px 0;background:var(--bg);}
.tab{padding:9px 20px;border-radius:8px 8px 0 0;cursor:pointer;color:var(--text2);font-weight:600;font-size:13px;border:1px solid transparent;border-bottom:none;transition:all .15s;}
.tab.active{background:var(--surface);color:var(--text);border-color:var(--border);}
.tab:hover:not(.active){color:var(--text);}
.tab-body{display:none;}.tab-body.active{display:block;}
.tab-content{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 8px 8px 8px;padding:20px;min-height:400px;}
.folder-banner{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.folder-banner.ok{border-color:var(--ok);}
.folder-path{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.folder-path b{color:var(--text);}
.month-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.month-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;}
.month-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.month-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}
.dash-table-wrap{overflow-x:auto;}
.dash-table{width:100%;border-collapse:collapse;font-size:12px;}
.dash-table th{background:var(--surface2);color:var(--text2);padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;}
.dash-table td{padding:7px 10px;border-bottom:1px solid rgba(46,51,80,.4);vertical-align:middle;}
.dash-table tr:hover td{background:rgba(79,142,247,.04);}
.dash-table .num{text-align:right;font-variant-numeric:tabular-nums;}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.sbadge-ok{background:rgba(34,197,94,.15);color:var(--ok);}
.sbadge-error{background:rgba(239,68,68,.15);color:var(--error);}
.sbadge-none{background:var(--surface2);color:var(--text2);}
.sbadge-warn{background:rgba(245,158,11,.15);color:var(--warn);}
.sbadge-next{background:rgba(245,158,11,.2);color:#f59e0b;border:1px solid rgba(245,158,11,.4);}
.match-banner.next{background:rgba(245,158,11,.12);border:1px solid var(--warn);color:var(--warn);}
/* パターンバッジ */
.ptag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:monospace;}
.pt-a{background:rgba(52,211,153,.2);color:#34d399;}
.pt-b{background:rgba(96,165,250,.2);color:#60a5fa;}
.pt-c{background:rgba(167,139,250,.2);color:#a78bfa;}
.pt-d,.pt-da{background:rgba(245,158,11,.2);color:#f59e0b;}
.pt-e{background:rgba(56,189,248,.2);color:#38bdf8;}
.pt-f{background:rgba(232,121,249,.2);color:#e879f9;}
.pt-g{background:rgba(244,114,182,.2);color:#f472b6;}
.pt-y{background:rgba(148,163,184,.2);color:#94a3b8;}
.steps{display:flex;flex-direction:column;gap:14px;}
.step{background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s;}
.step.active{border-color:var(--accent);}.step.done{border-color:var(--ok);opacity:.9;}
.step-hdr{display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;user-select:none;}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;}
.step.active .step-num{background:var(--accent);}.step.done .step-num{background:var(--ok);}
.step-title{font-weight:600;font-size:13px;}
.step-sub{color:var(--text2);font-size:11px;margin-left:auto;}
.step-body{padding:16px;display:none;}
.step.active .step-body,.step.open .step-body{display:block;}
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:28px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(79,142,247,.05);}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop-icon{font-size:28px;margin-bottom:6px;}
.drop-text{color:var(--text2);font-size:12px;}.drop-text b{color:var(--accent);}
.file-loaded{border-color:var(--ok);background:rgba(34,197,94,.05);}
.btn{padding:8px 18px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover{background:#3d7be0;}
.btn-primary:disabled{background:var(--border);color:var(--text3);cursor:not-allowed;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-precision{background:var(--surface2);color:var(--accent);border:1px solid var(--accent);}.btn-precision:hover{background:rgba(79,142,247,.15);}
.btn-sm{padding:5px 12px;font-size:11px;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start;}
.col{flex:1;min-width:160px;}
label{display:block;color:var(--text2);font-size:11px;margin-bottom:4px;text-transform:uppercase;}
input[type=text],input[type=password],select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:7px;font-size:12px;}
input:focus,select:focus{outline:none;border-color:var(--accent);}
.info-text{color:var(--text2);font-size:12px;line-height:1.6;}
.mt8{margin-top:8px;}.mt16{margin-top:16px;}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin:10px 0;}
.progress-bar .fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(79,142,247,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.summary-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.sc{flex:1;min-width:120px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.sc .sl{color:var(--text2);font-size:11px;margin-bottom:3px;}.sc .sv{font-size:16px;font-weight:700;}
.match-banner{border-radius:10px;padding:16px 20px;display:flex;align-items:center;gap:14px;font-size:14px;font-weight:600;}
.match-banner.ok{background:rgba(34,197,94,.12);border:1px solid var(--ok);color:var(--ok);}
.match-banner.error{background:rgba(239,68,68,.12);border:1px solid var(--error);color:var(--error);}
.match-banner .detail{color:var(--text2);font-size:12px;font-weight:400;margin-top:2px;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--surface2);color:var(--text2);padding:7px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:7px 10px;border-bottom:1px solid rgba(46,51,80,.5);vertical-align:middle;}
tr:hover td{background:rgba(79,142,247,.04);}
.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:600;}
.tag-ok{background:rgba(34,197,94,.15);color:var(--ok);}
.tag-error{background:rgba(239,68,68,.15);color:var(--error);}
.tag-warn{background:rgba(245,158,11,.15);color:var(--warn);}
.diff-text{color:var(--error);font-size:11px;}
.mono{font-family:'Consolas',monospace;}
.manual-input{background:var(--surface2);border:1px solid var(--accent);border-radius:8px;padding:12px 14px;margin-top:10px;}
.manual-input label{color:var(--accent);}
.hint{color:var(--text2);font-size:11px;margin-top:4px;}
.empty-state{text-align:center;padding:40px;color:var(--text2);}
.empty-state .ei{font-size:40px;margin-bottom:10px;}
.notes-badge{font-size:10px;color:var(--text3);margin-top:2px;}
</style>
</head>
<body>

<header>
  <div class="logo">LEAN<span>AI</span></div>
  <div class="version">請求書確認ツール v2.6 (2026-06-01)</div>
  <div style="font-size:10px;font-weight:700;background:rgba(79,142,247,.2);color:var(--accent);padding:2px 8px;border-radius:4px;letter-spacing:.5px;">E-01</div>
  <div class="api-mini">
    <span style="color:var(--text2);font-size:11px;">API KEY</span>
    <div class="api-dot" id="apiDot"></div>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." maxlength="200">
    <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px;" onclick="saveApiKey()">保存</button>
    <button id="themeToggleBtn" onclick="toggleTheme()"
      style="background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer;font-size:12px;color:var(--text);display:flex;align-items:center;gap:4px;transition:all .2s;white-space:nowrap;">
      🌙 ダーク
    </button>
  </div>
</header>
<!-- Rest of the tool content is identical to LEENAI_invoice_check_v2_6.html -->
<p style="padding:20px;color:var(--text2);">This is a placeholder. Tor should replace this with the actual LEENAI_invoice_check_v2_6.html content.</p>
<footer style="text-align:center;padding:18px;color:var(--text3);font-size:11px;margin-top:20px;">
  ✦ Powered by LEENAI Automation System
</footer>
</body>
</html>
